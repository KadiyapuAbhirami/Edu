<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order - IDEAL EDUPRINT-HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background: linear-gradient(135deg, #0c0c1e 0%, #1a1a3e 50%, #0d2b4a 100%);
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .background::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(0, 212, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 180, 216, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 40%, rgba(56, 189, 248, 0.1) 0%, transparent 40%);
            animation: bgPulse 8s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .shape {
            position: absolute;
            opacity: 0.1;
            animation: float 20s ease-in-out infinite;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            top: 10%;
            left: 10%;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border-radius: 50%;
        }

        .shape-2 {
            width: 200px;
            height: 200px;
            top: 60%;
            right: 15%;
            background: linear-gradient(135deg, #00ffc8, #00b894);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-10px, 20px) rotate(-3deg); }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            position: relative;
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #00d4ff 0%, #00ffc8 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-badge {
            padding: 8px 16px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 20px;
            color: #00d4ff;
            font-size: 14px;
            font-weight: 500;
        }

        .logout-btn {
            padding: 10px 20px;
            color: #ff6b6b;
            text-decoration: none;
            font-weight: 500;
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: 25px;
            transition: all 0.3s ease;
            background: rgba(255, 107, 107, 0.1);
        }

        .logout-btn:hover {
            background: rgba(255, 107, 107, 0.2);
            border-color: #ff6b6b;
        }

        .container {
            min-height: calc(100vh - 90px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
            position: relative;
        }

        .page-title {
            text-align: center;
            margin-bottom: 50px;
            animation: fadeInDown 0.6s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-title h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .page-title p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.1rem;
        }

.options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            max-width: 800px;
            width: 100%;
            animation: fadeInUp 0.6s ease-out 0.2s both;
            position: relative;
            padding: 4px;
            background: linear-gradient(135deg, #00d4ff, #00ffc8, #a855f7, #00d4ff);
            background-size: 300% 300%;
            animation: borderGradient 4s ease infinite;
            border-radius: 30px;
        }

        .options-grid::before {
            content: '';
            position: absolute;
            inset: 4px;
            background: linear-gradient(135deg, #0c0c1e 0%, #1a1a3e 50%, #0d2b4a 100%);
            border-radius: 27px;
            z-index: -1;
        }

        @keyframes borderGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .option-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 50px 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .option-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.1), rgba(0, 255, 200, 0.05));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .option-card:hover {
            transform: translateY(-10px);
            border-color: #00d4ff;
            box-shadow: 0 20px 60px rgba(0, 212, 255, 0.2);
        }

        .option-card:hover::before {
            opacity: 1;
        }

        .option-icon {
            font-size: 70px;
            margin-bottom: 20px;
            display: block;
            position: relative;
            z-index: 1;
        }

        .option-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .option-desc {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
            position: relative;
            z-index: 1;
        }

        .option-card.materials { --accent-color: #00d4ff; }
        .option-card.stationery { --accent-color: #00ffc8; }
        .option-card:hover .option-title { color: var(--accent-color); }

        @media (max-width: 600px) {
            .header { padding: 15px 20px; flex-direction: column; gap: 15px; }
            .user-info { width: 100%; justify-content: space-between; }
            .options-grid { grid-template-columns: 1fr; padding: 0 20px; }
            .option-card { padding: 40px 20px; }
        }
    </style>
</head>
<body>
    <div class="background">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <header class="header">
        <a href="index.html" class="logo">
            <div class="logo-icon">📚</div>
            <span class="logo-text">IDEAL EDUPRINT-HUB</span>
        </a>
        <div class="user-info">
            <div class="user-badge" id="user-badge">Welcome, Student</div>
            <a href="login.html" class="logout-btn">Logout</a>
        </div>
    </header>

    <div class="container">
        <div class="page-title">
            <h1>What would you like to order?</h1>
            <p>Select an option below to continue</p>
        </div>

        <div class="options-grid">
            <div class="option-card materials" onclick="selectOption('materials')">
                <span class="option-icon">📄</span>
                <h2 class="option-title">Materials</h2>
                <p class="option-desc">Print notes, assignments, papers, documents & more</p>
            </div>

            <div class="option-card stationery" onclick="selectOption('stationery')">
                <span class="option-icon">✏️</span>
                <h2 class="option-title">Stationery Items</h2>
                <p class="option-desc">Pens, pencils, notebooks, files & other supplies</p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const userType = sessionStorage.getItem('userType') || 'student';
            const badge = document.getElementById('user-badge');
            const displayType = userType.charAt(0).toUpperCase() + userType.slice(1);
            badge.textContent = `Welcome, ${displayType}`;
        });

        function selectOption(option) {
            sessionStorage.setItem('selectedOption', option);
if (option === 'materials') {
                window.location.href = 'student_selection.html';
            } else if (option === 'stationery') {
                window.location.href = 'stationery_new.html';
            }
        }
    </script>
</body>
</html>

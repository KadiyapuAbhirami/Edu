<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - IDEAL EDUPRINT-HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; min-height: 100vh; background: linear-gradient(135deg, #0c0c1e 0%, #1a1a3e 50%, #0d2b4a 100%); color: #fff; }
        
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 40px; 
            background: rgba(0, 0, 0, 0.3); 
            backdrop-filter: blur(20px); 
        }
        .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: #fff; }
        .logo-icon { width: 50px; height: 50px; background: linear-gradient(135deg, #00d4ff, #00ffc8); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; }
        .logo-text { font-size: 1.5rem; font-weight: 700; background: linear-gradient(135deg, #ffffff, #00d4ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .user-info { display: flex; align-items: center; gap: 15px; }
        .logout-btn { padding: 10px 20px; background: linear-gradient(135deg, #ff4757, #ff3838); border: none; border-radius: 25px; color: white; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .logout-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(255, 71, 87, 0.4); }
        
        .container { padding: 40px; max-width: 1400px; margin: 0 auto; }
        
        .dashboard-tabs { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .tab-btn { padding: 15px 25px; background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.2); border-radius: 15px; color: #fff; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .tab-btn.active { background: linear-gradient(135deg, #00d4ff, #00ffc8); border-color: #00d4ff; }
        .tab-btn:hover { background: rgba(0, 212, 255, 0.2); }
        
        .tab-content { display: none; background: rgba(255, 255, 255, 0.05); border-radius: 20px; padding: 30px; backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: rgba(0, 212, 255, 0.1); border-radius: 15px; padding: 25px; text-align: center; border: 1px solid rgba(0, 212, 255, 0.3); }
        .stat-number { font-size: 2.5rem; font-weight: 800; background: linear-gradient(135deg, #00d4ff, #00ffc8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .stat-label { font-size: 1rem; opacity: 0.8; margin-top: 5px; }
        
        .data-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .data-table th, .data-table td { padding: 15px; text-align: left; border-bottom: 1px solid rgba(255, 255, 255, 0.1); }
        .data-table th { background: rgba(0, 212, 255, 0.2); font-weight: 600; }
        .data-table tr:hover { background: rgba(255, 255, 255, 0.05); }
        
        .no-data { text-align: center; padding: 50px; color: rgba(255, 255, 255, 0.5); font-style: italic; }
        
        .loading { text-align: center; padding: 50px; color: #00d4ff; font-size: 1.2rem; }
        
        @media (max-width: 768px) {
            .dashboard-tabs { flex-direction: column; }
            .stats-grid { grid-template-columns: 1fr; }
            .data-table { font-size: 0.9rem; }
            .data-table th, .data-table td { padding: 10px 5px; }
        }
    </style>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo">
            <div class="logo-icon">📚</div>
            <span class="logo-text">IDEAL EDUPRINT-HUB - Admin</span>
        </a>
        <div class="user-info">
            <span id="currentUser"></span>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </header>
    
    <div class="container">
        <div class="dashboard-tabs">
            <button class="tab-btn active" onclick="switchTab('students')">Students</button>
            <button class="tab-btn" onclick="switchTab('faculty')">Faculty</button>
            <button class="tab-btn" onclick="switchTab('materials')">Materials</button>
        </div>
        
        <div id="students-tab" class="tab-content active">
            <h2>Student Details</h2>
            <div class="stats-grid" id="student-stats">
                <div class="stat-card">
                    <div class="stat-number" id="total-students">0</div>
                    <div class="stat-label">Total Students</div>
                </div>
            </div>
            <table class="data-table" id="students-table">
                <thead>
                    <tr>
                        <th>Username</th>
                        <th>Email</th>
                        <th>Year</th>
                        <th>Branch</th>
                        <th>Regulation</th>
                        <th>Date</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
        
        <div id="faculty-tab" class="tab-content">
            <h2>Faculty Details</h2>
            <div class="stats-grid" id="faculty-stats">
                <div class="stat-card">
                    <div class="stat-number" id="total-faculty">0</div>
                    <div class="stat-label">Faculty Profiles</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="total-uploads">0</div>
                    <div class="stat-label">Uploads</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="total-generations">0</div>
                    <div class="stat-label">Generations</div>
                </div>
            </div>
            <div id="faculty-profiles"></div>
            <div id="faculty-uploads"></div>
            <div id="faculty-generations"></div>
        </div>
        
        <div id="materials-tab" class="tab-content">
            <h2>All Materials</h2>
            <p>Combined view of all uploads and generations across faculty.</p>
            <!-- Similar table structure -->
        </div>
    </div>
    
    <script>
        // Auth check
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        
        if (!token || user.role !== 'admin') {
            alert('Admin access required');
            window.location.href = 'login.html';
            throw new Error('Unauthorized');
        }
        
        document.getElementById('currentUser').textContent = `Welcome, ${user.username}`;
        
        let studentsData = [];
        let facultyData = [];
        
        async function fetchStudents() {
            try {
                const response = await fetch('/api/admin/students', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (data.success) {
                    studentsData = data.students;
                    displayStudents();
                }
            } catch (error) {
                console.error('Error fetching students:', error);
            }
        }
        
        async function fetchFaculty() {
            try {
                const response = await fetch('/api/admin/faculty', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                if (data.success) {
                    facultyData = data;
                    displayFaculty();
                }
            } catch (error) {
                console.error('Error fetching faculty:', error);
            }
        }
        
        function displayStudents() {
            const tbody = document.querySelector('#students-table tbody');
            const table = document.querySelector('#students-table');
            tbody.innerHTML = '';
            
            if (studentsData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="no-data">No student data yet</td></tr>';
                document.getElementById('total-students').textContent = '0';
                return;
            }
            
            document.getElementById('total-students').textContent = studentsData.length;
            
            studentsData.forEach(student => {
                const row = tbody.insertRow();
                row.innerHTML = `
                    <td>${student.userId.username}</td>
                    <td>${student.userId.email}</td>
                    <td>${student.year}</td>
                    <td>${student.branch}</td>
                    <td>${student.regulation}</td>
                    <td>${new Date(student.createdAt).toLocaleDateString()}</td>
                `;
            });
        }
        
        function displayFaculty() {
            // Profiles
            const profilesDiv = document.getElementById('faculty-profiles');
            profilesDiv.innerHTML = '<h3>Faculty Profiles</h3>';
            if (facultyData.profiles.length === 0) {
                profilesDiv.innerHTML += '<p class="no-data">No faculty profiles</p>';
            } else {
                document.getElementById('total-faculty').textContent = facultyData.profiles.length;
                facultyData.profiles.forEach(profile => {
                    profilesDiv.innerHTML += `
                        <div style="background: rgba(255,255,255,0.05); padding: 20px; margin: 10px 0; border-radius: 10px;">
                            <strong>${profile.userId.username}</strong> - ${profile.year || 'N/A'} ${profile.branch || 'N/A'} ${profile.regulation || 'N/A'}
                        </div>
                    `;
                });
            }
            
            // Uploads
            const uploadsDiv = document.getElementById('faculty-uploads');
            uploadsDiv.innerHTML = '<h3>Faculty Uploads</h3>';
            if (facultyData.uploads.length === 0) {
                uploadsDiv.innerHTML += '<p class="no-data">No uploads</p>';
            } else {
                document.getElementById('total-uploads').textContent = facultyData.uploads.length;
                facultyData.uploads.forEach(upload => {
                    uploadsDiv.innerHTML += `
                        <div style="background: rgba(255,255,255,0.05); padding: 15px; margin: 5px 0; border-radius: 8px;">
                            <strong>${upload.materialType}</strong> - ${upload.subject} (${upload.status})
                        </div>
                    `;
                });
            }
            
            // Generations
            const generationsDiv = document.getElementById('faculty-generations');
            generationsDiv.innerHTML = '<h3>AI Generations</h3>';
            if (facultyData.generations.length === 0) {
                generationsDiv.innerHTML += '<p class="no-data">No generations</p>';
            } else {
                document.getElementById('total-generations').textContent = facultyData.generations.length;
                facultyData.generations.forEach(gen => {
                    generationsDiv.innerHTML += `
                        <div style="background: rgba(255,255,255,0.05); padding: 15px; margin: 5px 0; border-radius: 8px;">
                            <strong>${gen.subject}</strong> - ${gen.generationType} (${gen.status})
                        </div>
                    `;
                });
            }
        }
        
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName + '-tab').classList.add('active');
        }
        
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
        
        // Load data on page load
        fetchStudents();
        fetchFaculty();
    </script>
</body>
</html>

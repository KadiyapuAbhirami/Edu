<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materials - IDEAL EDUPRINT-HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background: linear-gradient(135deg, #0c0c1e 0%, #1a1a3e 50%, #0d2b4a 100%);
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .background::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(0, 212, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 180, 216, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 40%, rgba(56, 189, 248, 0.1) 0%, transparent 40%);
            animation: bgPulse 8s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .shape {
            position: absolute;
            opacity: 0.1;
            animation: float 20s ease-in-out infinite;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            top: 10%;
            left: 10%;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border-radius: 50%;
        }

        .shape-2 {
            width: 200px;
            height: 200px;
            top: 60%;
            right: 15%;
            background: linear-gradient(135deg, #00ffc8, #00b894);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-10px, 20px) rotate(-3deg); }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            position: relative;
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #00d4ff 0%, #00ffc8 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .user-badge {
            padding: 8px 16px;
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 20px;
            color: #00d4ff;
            font-size: 14px;
            font-weight: 500;
        }

        .nav-btn {
            padding: 10px 20px;
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .nav-btn.logout {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            color: #ff6b6b;
        }

        .container {
            min-height: calc(100vh - 90px);
            padding: 40px 20px;
            position: relative;
        }

        .page-title {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInDown 0.6s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-title h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .page-title p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.1rem;
        }

        .order-form {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-label {
            display: block;
            color: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .form-input, .form-select, .form-textarea {
            width: 100%;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-input:focus, .form-select:focus, .form-textarea:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        .form-textarea {
            resize: vertical;
            min-height: 120px;
        }

        .form-select {
            cursor: pointer;
        }

        .form-select option {
            background: #1a1a3e;
            color: #fff;
        }

        .options-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .option-group label {
            color: rgba(255, 255, 255, 0.7);
            font-size: 13px;
            display: block;
            margin-bottom: 8px;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #00d4ff 0%, #00ffc8 100%);
            border: none;
            border-radius: 12px;
            color: #0c0c1e;
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.4);
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
                padding: 15px 20px;
            }

            .options-row {
                grid-template-columns: 1fr;
            }

            .order-form {
                padding: 25px;
            }
        }
    </style>
</head>
<body>
    <div class="background">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <header class="header">
        <a href="index.html" class="logo">
            <div class="logo-icon">📚</div>
            <span class="logo-text">IDEAL EDUPRINT-HUB</span>
        </a>
        <div class="nav-links">
            <div class="user-badge" id="user-badge">Welcome, Student</div>
            <a href="order.html" class="nav-btn">← Back</a>
            <a href="login.html" class="nav-btn logout">Logout</a>
        </div>
    </header>

    <div class="container">
        <div class="page-title">
            <h1>Printing Materials</h1>
            <p>Upload your documents for printing</p>
        </div>

        <div class="order-form">
            <form onsubmit="placePrintOrder(event)">
                <div class="form-group">
                    <label class="form-label">Document Type</label>
                    <select class="form-select" id="docType" required>
                        <option value="">Select document type</option>
                        <option value="notes">Class Notes</option>
                        <option value="assignment">Assignment</option>
                        <option value="question_paper">Question Paper</option>
                        <option value="project">Project Work</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="options-row">
                    <div class="option-group">
                        <label class="form-label">Number of Pages</label>
                        <input type="number" class="form-input" id="numPages" min="1" value="1" required>
                    </div>
                    <div class="option-group">
                        <label class="form-label">Number of Copies</label>
                        <input type="number" class="form-input" id="numCopies" min="1" value="1" required>
                    </div>
                </div>

                <div class="options-row">
                    <div class="option-group">
                        <label class="form-label">Print Color</label>
                        <select class="form-select" id="printColor" required>
                            <option value="black_white">Black & White</option>
                            <option value="color">Color</option>
                        </select>
                    </div>
                    <div class="option-group">
                        <label class="form-label">Print Side</label>
                        <select class="form-select" id="printSide" required>
                            <option value="single">Single Side</option>
                            <option value="double">Both Sides</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Additional Instructions (Optional)</label>
                    <textarea class="form-textarea" id="instructions" placeholder="Any specific requirements..."></textarea>
                </div>

                <button type="submit" class="submit-btn">Place Order</button>
            </form>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const userType = sessionStorage.getItem('userType') || 'student';
            document.getElementById('user-badge').textContent = 'Welcome, ' + userType.charAt(0).toUpperCase() + userType.slice(1);
        });

        function placePrintOrder(event) {
            event.preventDefault();
            
            var userType = sessionStorage.getItem('userType') || 'student';
            
            var order = {
                id: Date.now(),
                type: 'printing',
                userType: userType,
                userId: userType === 'student' ? sessionStorage.getItem('studentRoll') || 'Student' : sessionStorage.getItem('userName') || userType,
                details: {
                    docType: document.getElementById('docType').value,
                    numPages: parseInt(document.getElementById('numPages').value),
                    numCopies: parseInt(document.getElementById('numCopies').value),
                    printColor: document.getElementById('printColor').value,
                    printSide: document.getElementById('printSide').value,
                    instructions: document.getElementById('instructions').value
                },
                total: calculateTotal(),
                date: new Date().toISOString(),
                status: 'Pending'
            };
            
            var orders = JSON.parse(localStorage.getItem('allOrders') || '[]');
            orders.push(order);
            localStorage.setItem('allOrders', JSON.stringify(orders));
            
            alert('Print order placed successfully! Xerox will receive your order.');
            event.target.reset();
        }

        function calculateTotal() {
            var pages = parseInt(document.getElementById('numPages').value) || 1;
            var copies = parseInt(document.getElementById('numCopies').value) || 1;
            var isColor = document.getElementById('printColor').value === 'color';
            var isDouble = document.getElementById('printSide').value === 'double';
            
            var ratePerPage = isColor ? 5 : 2;
            if (isDouble) ratePerPage = ratePerPage * 0.8;
            
            return Math.round(ratePerPage * pages * copies);
        }
    </script>
</body>
</html>

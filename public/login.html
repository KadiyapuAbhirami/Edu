<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - IDEAL EDUPRINT-HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;       
        }
        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background: linear-gradient(135deg, #0c0c1e 0%, #1a1a3e 50%, #0d2b4a 100%);
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .background::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(0, 212, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 180, 216, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 40%, rgba(56, 189, 248, 0.1) 0%, transparent 40%);
            animation: bgPulse 8s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .shape {
            position: absolute;
            opacity: 0.1;
            animation: float 20s ease-in-out infinite;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            top: 10%;
            left: 10%;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border-radius: 50%;
        }

        .shape-2 {
            width: 200px;
            height: 200px;
            top: 60%;
            right: 15%;
            background: linear-gradient(135deg, #00ffc8, #00b894);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-10px, 20px) rotate(-3deg); }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            position: relative;
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #00d4ff 0%, #00ffc8 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            color: #00d4ff;
            text-decoration: none;
            font-weight: 500;
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 25px;
            transition: all 0.3s ease;
            background: rgba(0, 212, 255, 0.1);
        }

        .back-btn:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
        }

        .container {
            min-height: calc(100vh - 90px);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        .login-card {
            position: relative;
            padding: 4px;
            background: linear-gradient(135deg, #00d4ff, #00ffc8, #a855f7, #00d4ff);
            background-size: 300% 300%;
            animation: borderGradient 4s ease infinite;
            border-radius: 28px;
        }

        .login-card::before {
            content: '';
            position: absolute;
            inset: 4px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            z-index: -1;
        }

        .login-card-inner {
            padding: 50px;
            width: 100%;
            max-width: 480px;
            box-shadow: 
                0 25px 50px rgba(0, 0, 0, 0.3),
                0 0 100px rgba(0, 212, 255, 0.1);
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes borderGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .tabs {
            display: flex;
            margin-bottom: 35px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 5px;
        }

        .tab {
            flex: 1;
            padding: 14px;
            border: none;
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .tab.active {
            background: linear-gradient(135deg, #00d4ff 0%, #00ffc8 100%);
            color: #0c0c1e;
        }

        .tab:hover:not(.active) {
            color: #fff;
        }

        .user-types {
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
        }

        .user-type {
            flex: 1;
            padding: 20px 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .user-type:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: rgba(0, 212, 255, 0.3);
        }

        .user-type.selected {
            background: rgba(0, 212, 255, 0.15);
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        .user-type-icon {
            font-size: 32px;
            margin-bottom: 8px;
            display: block;
        }

        .user-type-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            font-weight: 600;
        }

        .user-type.selected .user-type-label {
            color: #00d4ff;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .password-wrapper {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            cursor: pointer;
            font-size: 18px;
        }

        .password-toggle:hover {
            color: #00d4ff;
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #00d4ff 0%, #00ffc8 100%);
            border: none;
            border-radius: 12px;
            color: #0c0c1e;
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.4);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 25px 0;
            color: rgba(255, 255, 255, 0.3);
            font-size: 13px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .divider span {
            padding: 0 15px;
        }

        .social-login {
            display: flex;
            gap: 15px;
        }

        .social-btn {
            flex: 1;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .social-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .form-panel {
            display: none;
        }

        .form-panel.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .forgot-password {
            text-align: center;
            margin-top: 20px;
        }

        .forgot-password a {
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .forgot-password a:hover {
            color: #00d4ff;
        }

        .signup-link {
            text-align: center;
            margin-top: 25px;
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
        }

        .signup-link a {
            color: #00d4ff;
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 600px) {
            .header {
                padding: 15px 20px;
            }

            .login-card {
                padding: 30px 20px;
                margin: 10px;
            }

            .user-types {
                flex-direction: column;
            }

            .logo-text {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="background">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <header class="header">
        <a href="index.html" class="logo">
            <div class="logo-icon">📚</div>
            <span class="logo-text">IDEAL EDUPRINT-HUB</span>
        </a>
        <a href="index.html" class="back-btn">
            ← Back to Home
        </a>
    </header>

    <div class="container">
        <div class="login-card">
            <div class="login-card-inner">
                <div class="tabs">
                    <button class="tab active" onclick="switchTab('login')">Login</button>
                    <button class="tab" onclick="switchTab('signup')">Sign Up</button>
                </div>

                <div class="user-types">
                    <div class="user-type selected" onclick="selectUserType('student', this)">
                        <span class="user-type-icon">🎓</span>
                        <span class="user-type-label">Student</span>
                    </div>
                    <div class="user-type" onclick="selectUserType('faculty', this)">
                        <span class="user-type-icon">👨‍🏫</span>
                        <span class="user-type-label">Faculty</span>
                    </div>
                    <div class="user-type" onclick="selectUserType('xerox', this)">
                        <span class="user-type-icon">🖨️</span>
                        <span class="user-type-label">Xerox</span>
                    </div>
                    <div class="user-type" onclick="selectUserType('admin', this)">
                        <span class="user-type-icon">👑</span>
                        <span class="user-type-label">Admin</span>
                    </div>
                </div>

                <div class="form-panel active" id="login-panel">
                    <form onsubmit="handleLogin(event)">
                        <div class="form-group" id="login-roll-group">
                            <label class="form-label">Roll Number</label>
                            <input type="text" class="form-input" id="login-roll" placeholder="Enter your roll number">
                        </div>
                        <div class="form-group" id="login-name-group" style="display: none;">
                            <label class="form-label">Name</label>
                            <input type="text" class="form-input" id="login-name" placeholder="Enter your name">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <div class="password-wrapper">
                                <input type="password" class="form-input" id="login-password" placeholder="Enter your password" required>
                                <button type="button" class="password-toggle" onclick="togglePassword('login-password')">👁️</button>
                            </div>
                        </div>
                        <button type="submit" class="submit-btn">Login</button>
                        <div class="forgot-password">
                            <a href="#">Forgot Password?</a>
                        </div>
                    </form>
                    <div class="signup-link">
                        Don't have an account? <a href="#" onclick="switchTab('signup')">Sign Up</a>
                    </div>
                </div>

                <div class="form-panel" id="signup-panel">
                    <form onsubmit="handleSignup(event)">
                        <div class="form-group">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-input" placeholder="Enter your full name" required>
                        </div>
                        <div class="form-group" id="signup-roll-group">
                            <label class="form-label">Roll Number</label>
                            <input type="text" class="form-input" id="signup-roll" placeholder="Enter your roll number">
                        </div>
                        <div class="form-group">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-input" placeholder="Enter your email" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Password</label>
                            <div class="password-wrapper">
                                <input type="password" class="form-input" id="signup-password" placeholder="Create a password" required>
                                <button type="button" class="password-toggle" onclick="togglePassword('signup-password')">👁️</button>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="form-label">Confirm Password</label>
                            <div class="password-wrapper">
                                <input type="password" class="form-input" placeholder="Confirm your password" required>
                                <button type="button" class="password-toggle" onclick="togglePassword('signup-password')">👁️</button>
                            </div>
                        </div>
                        <button type="submit" class="submit-btn">Create Account</button>
                    </form>
                    <div class="signup-link">
                        Already have an account? <a href="#" onclick="switchTab('login')">Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedUserType = 'student';

        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tab');
            const panels = document.querySelectorAll('.form-panel');
            
            tabs.forEach(t => t.classList.remove('active'));
            panels.forEach(p => p.classList.remove('active'));
            
            if (tab === 'login') {
                tabs[0].classList.add('active');
                document.getElementById('login-panel').classList.add('active');
            } else {
                tabs[1].classList.add('active');
                document.getElementById('signup-panel').classList.add('active');
            }
        }

        function selectUserType(type, element) {
            selectedUserType = type;
            document.querySelectorAll('.user-type').forEach(t => t.classList.remove('selected'));
            element.classList.add('selected');
            
            const loginRollGroup = document.getElementById('login-roll-group');
            const loginNameGroup = document.getElementById('login-name-group');
            const signupRollGroup = document.getElementById('signup-roll-group');
            
            if (type === 'student') {
                loginRollGroup.style.display = 'block';
                loginNameGroup.style.display = 'none';
                signupRollGroup.style.display = 'block';
            } else {
                loginRollGroup.style.display = 'none';
                loginNameGroup.style.display = 'block';
                signupRollGroup.style.display = 'none';
            }
        }

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
            } else {
                input.type = 'password';
            }
        }

        async function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('login-roll')?.value || document.getElementById('login-name')?.value || '';
            const password = document.getElementById('login-password').value;
            
            if (!username || !password) {
                alert('Please enter username and password');
                return;
            }
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, userType: selectedUserType })
                });
                
                const data = await response.json();
                
                if (!data.success) {
                    alert(data.message);
                    return;
                }
                
                // Store token and user
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                
                window.location.href = data.redirect || 'index.html';
            } catch (error) {
                console.error('Login error:', error);
                alert('Login failed. Server error.');
            }
        }

        async function handleSignup(event) {
            event.preventDefault();
            
            const nameInput = event.target.querySelector('input[placeholder=\"Enter your full name\"]');
            const rollInput = document.getElementById('signup-roll');
            const emailInput = event.target.querySelector('input[type=\"email\"]');
            const passwordInput = document.getElementById('signup-password');
            const confirmPasswordInput = event.target.querySelectorAll('input[type=\"password\"]')[1];
            
            const username = selectedUserType === 'student' ? rollInput.value : nameInput.value;
            const email = emailInput.value;
            const password = passwordInput.value;
            const confirmPassword = confirmPasswordInput.value;
            
            if (password !== confirmPassword) {
                alert('Passwords do not match');
                return;
            }
            
            if (!username || !email || !password) {
                alert('All fields required');
                return;
            }
            
            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password, role: selectedUserType })
                });
                
                const data = await response.json();
                
                if (!data.success) {
                    alert(data.message);
                    return;
                }
                
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                alert('Account created! Logging in...');
                window.location.href = data.user.role === 'admin' ? 'admin_dashboard.html' : 
                                      selectedUserType === 'student' ? 'student_selection.html' : 'faculty_final.html';
            } catch (error) {
                console.error('Signup error:', error);
                alert('Signup failed. Server error.');
            }
        }

        // Update selectUserType for admin
        function selectUserType(type, element) {
            selectedUserType = type;
            document.querySelectorAll('.user-type').forEach(t => t.classList.remove('selected'));
            element.classList.add('selected');
            
            const loginRollGroup = document.getElementById('login-roll-group');
            const loginNameGroup = document.getElementById('login-name-group');
            const signupRollGroup = document.getElementById('signup-roll-group');
            
            if (type === 'student') {
                loginRollGroup.style.display = 'block';
                loginNameGroup.style.display = 'none';
                signupRollGroup.style.display = 'block';
            } else {
                loginRollGroup.style.display = 'none';
                loginNameGroup.style.display = 'block';
                signupRollGroup.style.display = 'none';
            }
        }

        // Global logout
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xerox Dashboard - IDEAL EDUPRINT-HUB</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            background: linear-gradient(135deg, #0c0c1e 0%, #1a1a3e 50%, #0d2b4a 100%);
        }

        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .background::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 80%, rgba(0, 212, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(0, 180, 216, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 40%, rgba(56, 189, 248, 0.1) 0%, transparent 40%);
            animation: bgPulse 8s ease-in-out infinite;
        }

        @keyframes bgPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .shape {
            position: absolute;
            opacity: 0.1;
            animation: float 20s ease-in-out infinite;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            top: 10%;
            left: 10%;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border-radius: 50%;
        }

        .shape-2 {
            width: 200px;
            height: 200px;
            top: 60%;
            right: 15%;
            background: linear-gradient(135deg, #00ffc8, #00b894);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(-10px, 20px) rotate(-3deg); }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            position: relative;
            z-index: 10;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #00d4ff 0%, #00ffc8 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff 0%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-links {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .nav-btn {
            padding: 10px 20px;
            color: #fff;
            text-decoration: none;
            font-weight: 500;
            border-radius: 25px;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
        }

        .nav-btn.active {
            background: linear-gradient(135deg, #00d4ff 0%, #00ffc8 100%);
            color: #0c0c1e;
        }

        .nav-btn.logout {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            color: #ff6b6b;
        }

        .container {
            min-height: calc(100vh - 90px);
            padding: 40px 20px;
            position: relative;
        }

        .page-title {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-title h1 {
            font-size: clamp(2rem, 5vw, 3rem);
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff 0%, #00d4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .page-title p {
            color: rgba(255, 255, 255, 0.6);
            font-size: 1.1rem;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Price Management */
        .price-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            max-width: 900px;
            margin: 0 auto;
        }

        .price-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
        }

        .price-card h3 {
            color: #fff;
            font-size: 1.1rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .price-input-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .price-input {
            flex: 1;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            font-weight: 600;
        }

        .price-input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .price-symbol {
            color: #00d4ff;
            font-size: 18px;
            font-weight: 600;
        }

        .save-btn {
            padding: 12px 20px;
            background: linear-gradient(135deg, #00d4ff 0%, #00ffc8 100%);
            border: none;
            border-radius: 8px;
            color: #0c0c1e;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
        }

        .save-btn:hover {
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
        }

        .save-all-btn {
            display: block;
            margin: 30px auto 0;
            padding: 15px 40px;
            background: linear-gradient(135deg, #00d4ff 0%, #00ffc8 100%);
            border: none;
            border-radius: 30px;
            color: #0c0c1e;
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        .save-all-btn:hover {
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.4);
        }

        /* Orders */
        .orders-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
        }

        .orders-header h2 {
            color: #fff;
            font-size: 1.5rem;
        }

        .orders-grid {
            display: grid;
            gap: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .order-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 25px;
            transition: all 0.3s ease;
        }

        .order-card:hover {
            border-color: rgba(0, 212, 255, 0.3);
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .order-id {
            color: #00d4ff;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .order-date {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }

        .order-status {
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .order-status.pending {
            background: rgba(255, 193, 7, 0.2);
            color: #ffc107;
        }

        .order-status.completed {
            background: rgba(0, 255, 200, 0.2);
            color: #00ffc8;
        }

        .order-user {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .order-user span {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        .order-user strong {
            color: #fff;
        }

        .order-items {
            margin-bottom: 15px;
        }

        .order-items h4 {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            margin-bottom: 10px;
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            color: #fff;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .order-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .order-total span {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        .order-total strong {
            color: #00d4ff;
            font-size: 1.3rem;
        }

        .order-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .action-btn.complete {
            background: rgba(0, 255, 200, 0.2);
            color: #00ffc8;
            border: 1px solid rgba(0, 255, 200, 0.3);
        }

        .action-btn.complete:hover {
            background: rgba(0, 255, 200, 0.3);
        }

        .action-btn.delete {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 107, 107, 0.3);
        }

        .action-btn.delete:hover {
            background: rgba(255, 107, 107, 0.3);
        }

        .no-orders {
            text-align: center;
            color: rgba(255, 255, 255, 0.5);
            padding: 60px 20px;
            font-size: 1.1rem;
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
                padding: 15px 20px;
            }

            .price-grid {
                grid-template-columns: 1fr;
            }

            .order-header {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="background">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
    </div>

    <header class="header">
        <a href="index.html" class="logo">
            <div class="logo-icon">📚</div>
            <span class="logo-text">IDEAL EDUPRINT-HUB</span>
        </a>
        <div class="nav-links">
            <button class="nav-btn active" onclick="showSection('orders')">Received Orders</button>
            <button class="nav-btn" onclick="showSection('prices')">Edit Prices</button>
            <a href="login.html" class="nav-btn logout">Logout</a>
        </div>
    </header>

    <div class="container">
        <div class="page-title">
            <h1>Xerox Dashboard</h1>
            <p>Manage orders and update stationery prices</p>
        </div>

        <!-- Orders Section -->
        <div class="section active" id="orders-section">
            <div class="orders-header">
                <h2>Received Orders</h2>
            </div>
            <div class="orders-grid" id="orders-grid">
                <p class="no-orders">No orders received yet.</p>
            </div>
        </div>

        <!-- Prices Section -->
        <div class="section" id="prices-section">
            <div class="price-grid" id="price-grid">
                <!-- Price cards will be generated by JS -->
            </div>
            <button class="save-all-btn" onclick="saveAllPrices()">Save All Prices</button>
        </div>
    </div>

    <script>
        // Default prices
        var defaultPrices = {
            pen: 5,
            pencil: 3,
            eraser: 2,
            book20: 20,
            book25: 25,
            book30: 30,
            register: 50,
            file: 15
        };

        var itemNames = {
            pen: 'Pen',
            pencil: 'Pencil',
            eraser: 'Eraser',
            book20: 'Notebook (120 Pages)',
            book25: 'Notebook (200 Pages)',
            book30: 'Practical Book',
            register: 'Register (200 Pages)',
            file: 'File Folder'
        };

        var itemIcons = {
            pen: '🖊️',
            pencil: '✏️',
            eraser: '🧹',
            book20: '📓',
            book25: '📔',
            book30: '📕',
            register: '📒',
            file: '📁'
        };

        function showSection(section) {
            document.querySelectorAll('.section').forEach(function(s) {
                s.classList.remove('active');
            });
            document.querySelectorAll('.nav-btn').forEach(function(btn) {
                btn.classList.remove('active');
            });
            
            document.getElementById(section + '-section').classList.add('active');
            event.target.classList.add('active');

            if (section === 'orders') {
                loadOrders();
            } else if (section === 'prices') {
                loadPriceEditor();
            }
        }

        function loadOrders() {
            var orders = JSON.parse(localStorage.getItem('allOrders') || '[]');
            var grid = document.getElementById('orders-grid');
            
            if (orders.length === 0) {
                grid.innerHTML = '<p class="no-orders">No orders received yet.</p>';
                return;
            }

            // Sort by date (newest first)
            orders.sort(function(a, b) {
                return new Date(b.date) - new Date(a.date);
            });

            grid.innerHTML = orders.map(function(order) {
                var itemsHtml = '';
                if (order.items) {
                    order.items.forEach(function(item) {
                        itemsHtml += '<div class="item-row"><span>' + item.quantity + 'x ' + item.name + '</span><span>₹' + item.total + '</span></div>';
                    });
                } else if (order.details) {
                    itemsHtml = '<div class="item-row"><span>' + order.details.numPages + ' pages x ' + order.details.numCopies + ' copies</span><span>₹' + order.total + '</span></div>';
                    if (order.details.instructions) {
                        itemsHtml += '<div class="item-row" style="color: rgba(255,255,255,0.5); font-size: 12px;">Note: ' + order.details.instructions + '</div>';
                    }
                }

                var orderType = order.type === 'printing' ? '📄 Printing' : '✏️ Stationery';
                var date = new Date(order.date).toLocaleDateString() + ' ' + new Date(order.date).toLocaleTimeString();

                return '<div class="order-card" data-id="' + order.id + '">' +
                    '<div class="order-header">' +
                        '<div>' +
                            '<p class="order-id">#' + order.id + '</p>' +
                            '<p class="order-date">' + date + '</p>' +
                        '</div>' +
                        '<span class="order-status ' + order.status.toLowerCase() + '">' + order.status + '</span>' +
                    '</div>' +
                    '<div class="order-user">' +
                        '<span>Type: <strong>' + orderType + '</strong></span>' +
                        '<span>By: <strong>' + (order.userType === 'student' ? 'Student' : order.userType) + '</strong></span>' +
                        '<span>ID: <strong>' + order.userId + '</strong></span>' +
                    '</div>' +
                    '<div class="order-items">' +
                        '<h4>Items:</h4>' +
                        itemsHtml +
                    '</div>' +
                    '<div class="order-total">' +
                        '<span>Total Amount</span>' +
                        '<strong>₹' + order.total + '</strong>' +
                    '</div>' +
                    '<div class="order-actions">' +
                        '<button class="action-btn complete" onclick="completeOrder(' + order.id + ')">Mark Complete</button>' +
                        '<button class="action-btn delete" onclick="deleteOrder(' + order.id + ')">Delete</button>' +
                    '</div>' +
                '</div>';
            }).join('');
        }

        function completeOrder(orderId) {
            var orders = JSON.parse(localStorage.getItem('allOrders') || '[]');
            var index = orders.findIndex(function(o) { return o.id === orderId; });
            if (index !== -1) {
                orders[index].status = 'Completed';
                localStorage.setItem('allOrders', JSON.stringify(orders));
                loadOrders();
                alert('Order marked as completed!');
            }
        }

        function deleteOrder(orderId) {
            if (confirm('Are you sure you want to delete this order?')) {
                var orders = JSON.parse(localStorage.getItem('allOrders') || '[]');
                orders = orders.filter(function(o) { return o.id !== orderId; });
                localStorage.setItem('allOrders', JSON.stringify(orders));
                loadOrders();
            }
        }

        function loadPriceEditor() {
            var stored = localStorage.getItem('stationeryPrices');
            var prices = stored ? JSON.parse(stored) : defaultPrices;
            
            var grid = document.getElementById('price-grid');
            grid.innerHTML = '';
            
            for (var key in itemNames) {
                var card = document.createElement('div');
                card.className = 'price-card';
                card.innerHTML = '<h3>' + itemIcons[key] + ' ' + itemNames[key] + '</h3>' +
                    '<div class="price-input-group">' +
                        '<span class="price-symbol">₹</span>' +
                        '<input type="number" class="price-input" id="price-' + key + '" value="' + prices[key] + '" min="0">' +
                    '</div>' +
                    '<button class="save-btn" onclick="savePrice(\'' + key + '\')">Save</button>';
                grid.appendChild(card);
            }
        }

        function savePrice(key) {
            var value = parseInt(document.getElementById('price-' + key).value);
            var stored = localStorage.getItem('stationeryPrices');
            var prices = stored ? JSON.parse(stored) : defaultPrices;
            prices[key] = value;
            localStorage.setItem('stationeryPrices', JSON.stringify(prices));
            alert(itemNames[key] + ' price updated to ₹' + value);
        }

        function saveAllPrices() {
            var prices = {};
            for (var key in itemNames) {
                prices[key] = parseInt(document.getElementById('price-' + key).value);
            }
            localStorage.setItem('stationeryPrices', JSON.stringify(prices));
            alert('All prices saved successfully!');
        }

        // Load orders on page load
        document.addEventListener('DOMContentLoaded', function() {
            loadOrders();
        });
    </script>
</body>
</html>
